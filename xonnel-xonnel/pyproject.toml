[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xonnel-xonnel"
version = "0.1.0"
description = """A python library: xonnel-xonnel

- includes:
    - xonnel-emoji
    - xonnel-log
    - xonnel-dir
    - xonnel-xml
    - xonnel-zip
    - xonnel-www
    - xonnel-json
    - xonnel-copy
    - xonnel-exit
    - xonnel-test
    - xonnel-ver
    - xonnel-rand
    - xonnel-noise
    - xonnel-png
    - xonnel-pad
    - xonnel-gpt
    - xonnel-gui
    - xonnel-exe
    - xonnel-talk
    - xonnel-sock
    - xonnel-gen
    - xonnel-mail
    - xonnel-wrap
    - xonnel-eve
    - xonnel-git
    - xonnel-stat
    - xonnel-time
    - xonnel-back
    - xonnel-file
    - xonnel-cuda
    - xonnel-txt
    - xonnel-path
    - xonnel-lan
    - xonnel-wiki
    - xonnel-calc
    - xonnel-dtype
    - xonnel-int
    - xonnel-float
    - xonnel-bool
    - xonnel-str
    - xonnel-list
    - xonnel-tuple
    - xonnel-dict"""
authors = [{name = "Xonnel"}]
readme = "README.md"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
where = ["."]
