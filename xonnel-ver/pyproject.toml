[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xonnel-ver"
version = "0.1.0"
description = """A python library: xonnel-ver

- version standarizing
    - standarises all kinds of input to:
        - major
        - minor
        - patch
        - build

    up:
        - major
        - minor
        - patch
        - build

    down:
        - major
        - minor
        - patch
        - build

    compare al of:
        - <
        - >
        - ==
        - <=
        - >="""
authors = [{name = "Xonnel"}]
readme = "README.md"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
where = ["."]
