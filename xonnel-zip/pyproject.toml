[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xonnel-zip"
version = "0.1.0"
description = """A python library: xonnel-zip

- zip   (dir    →   .zip)
- zip   (file   →   .zip)
- unzip (.zip   →    dir)
- unzip (.zip   →   file)"""
authors = [{name = "Xonnel"}]
readme = "README.md"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
where = ["."]
