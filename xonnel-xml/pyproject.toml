[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xonnel-xml"
version = "0.1.0"
description = """A python library: xonnel-xml

- xml (from xml node)
- xml (from path)
- xml (from None)"""
authors = [{name = "Xonnel"}]
readme = "README.md"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
where = ["."]
