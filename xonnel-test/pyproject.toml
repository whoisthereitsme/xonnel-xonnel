[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "xonnel-test"
version = "0.1.0"
description = """A python library: xonnel-test

- configurable assert wrapper
    - onfail actions:
        - raise (default)
        - print

    - onpass actions:
        - raise
        - print (default)

    - works with any of:
        - callables (if returning a bool when eveluated)
        - booleans"""
authors = [{name = "Xonnel"}]
readme = "README.md"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
where = ["."]
